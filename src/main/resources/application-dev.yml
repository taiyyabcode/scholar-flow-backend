spring:
  datasource:
    url: "${DB_URL:jdbc:mysql://localhost:3306/scholar_flow_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}"
    username: "${DB_USERNAME:root}"
    password: "${DB_PASSWORD:Password@123}"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# Logging
logging:
  level:
    com.scholarflow: DEBUG
    org.springframework.security: DEBUG
