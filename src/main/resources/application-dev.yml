spring:
  datasource:
    url: jdbc:mysql://localhost:3306/scholar_flow_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: Password@123
